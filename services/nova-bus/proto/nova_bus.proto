syntax = "proto3";
package nova.bus;

// Wire format per docs/specs/15-NOVA-BUS-PROTOCOL-SPEC.md.
//
// Deviation from the spec, introduced during Phase 2 implementation and to be
// reconciled back into the spec doc during Phase 2.5 (Architecture Validation,
// docs/12-ROADMAP-AND-MILESTONES.md §4a): the spec's §9 describes a
// "RegisterHandler" message as existing but does not list it in §3's Envelope
// oneof. RegisterHandler/RegisterHandlerAck are added to the oneof here so the
// protocol is actually implementable; also note handler-registration is NOT
// yet ACL-restricted to privileged Nova services (any connected client may
// register a handler) since that restriction depends on nova-sessiond's
// identity system, which does not exist yet in this vertical slice.

message Envelope {
  uint32 protocol_version = 1;
  optional uint64 trace_id = 13;
  oneof kind {
    Connect connect = 2;
    ConnectAck connect_ack = 3;
    Call call = 4;
    Response response = 5;
    Subscribe subscribe = 6;
    SubscribeAck subscribe_ack = 7;
    Publish publish = 8;
    Unsubscribe unsubscribe = 9;
    Error error = 10;
    Ping ping = 11;
    Pong pong = 12;
    RegisterHandler register_handler = 14;
    RegisterHandlerAck register_handler_ack = 15;
  }
}

message Connect {
  uint32 protocol_version = 1;
  string identity = 2; // dev-mode self-reported identity; production would
                        // resolve this from SO_PEERCRED per the spec §10 —
                        // see services/nova-bus/src/broker.rs module doc.
}
message ConnectAck {
  uint32 protocol_version = 1;
  uint64 connection_id = 2;
}

message Call {
  uint64 correlation_id = 1;
  string topic = 2;
  bytes payload = 3;
  uint32 timeout_ms = 4;
}
message Response {
  uint64 correlation_id = 1;
  bytes payload = 2;
}

message Subscribe { string topic = 1; }
message SubscribeAck { string topic = 1; }
message Unsubscribe { string topic = 1; }
message Publish {
  string topic = 1;
  bytes payload = 2;
}

message RegisterHandler { string topic = 1; }
message RegisterHandlerAck { string topic = 1; }

enum ErrorCode {
  UNKNOWN = 0;
  PERMISSION_DENIED = 1;
  TIMEOUT = 2;
  NO_HANDLER = 3;
  HANDLER_ALREADY_REGISTERED = 4;
  INVALID_ARGUMENT = 5;
  TOPIC_NOT_FOUND = 6;
  PROTOCOL_VERSION_UNSUPPORTED = 7;
  INTERNAL = 8;
}
message Error {
  uint64 correlation_id = 1;
  ErrorCode code = 2;
  string message = 3;
}

message Ping {}
message Pong {}
